  <!-- ── Contact ── -->
  <main class="contact-page">
    <span class="contact-phi">φ</span>

    <h1 class="contact-heading">
      Let's create<br>something beautiful.
    </h1>
    <p class="contact-sub">
      Have a wedding, event, or project in mind?<br>
      Reach out on Instagram — I'd love to hear from you.
    </p>

    <a href="https://instagram.com/thephi.studio"
       target="_blank"
       rel="noopener"
       class="ig-card">

      <!-- Instagram SVG icon -->
      <div class="ig-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <circle cx="12" cy="12" r="4"/>
          <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor"/>
        </svg>
      </div>

      <span class="ig-at">Instagram</span>
      <span class="ig-handle">@thephi.studio</span>
      <span class="ig-cta">
        Follow &amp; Message
        <svg width="12" height="12" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square">
          <path d="M1 12L12 1M12 1H5M12 1V8"/>
        </svg>
      </span>
    </a>
